services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.staging
    restart: always
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/vendor
      - /app/node_modules
    depends_on:
      - db

  web:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - .:/app
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-triangle_pos}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
